name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run staged quality gate
        run: uv run python scripts/quality.py gate

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

  slot-arm64:
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 slot artifact
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          ./scripts/build_slot_artifact_ci.sh \
            --channel=dev \
            --version="${VERSION}" \
            --dest=dist

      - name: Upload ARM64 slot artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoyopod-slot-arm64-${{ github.sha }}
          path: dist/yoyopod-slot-*.tar.gz*
          if-no-files-found: error
